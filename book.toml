[book]
title = "Seed Forth"
authors = ["Ben Sandbrook"]
description = "A literate bootstrap from 2040 bytes to a self-hosting C compiler"
src = "book"
language = "en"

[build]
build-dir = "docs"
create-missing = false

[output.html]
site-url = "/seed-forth/"
default-theme = "light"
preferred-dark-theme = "coal"
mathjax-support = false
no-section-label = false
git-repository-url = "https://github.com/delta9000/seed-forth"

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
